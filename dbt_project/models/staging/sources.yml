version: 2

sources:
  - name: raw
    database: news_analytics
    schema: raw
    tables:
      - name: guardian_articles
        description: "Raw articles ingested from The Guardian API"
        columns:
          - name: article_id
            description: "Unique article identifier"
            tests:
              - unique
              - not_null
          - name: web_title
            tests:
              - not_null
          - name: section_name
            tests:
              - not_null
          - name: web_publication_date
            tests:
              - not_null